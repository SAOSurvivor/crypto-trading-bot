---
services:
  freqtrade:
    build:
      context: .
      dockerfile: Dockerfile
    image: freqtrade-kucoin:latest
    restart: unless-stopped
    container_name: freqtrade-kucoin
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - KUCOIN_API_KEY=${KUCOIN_API_KEY}
      - KUCOIN_API_SECRET=${KUCOIN_API_SECRET}
      - KUCOIN_API_PASSPHRASE=${KUCOIN_API_PASSPHRASE}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - API_JWT_SECRET=${API_JWT_SECRET:-changeme}
      - API_USERNAME=${API_USERNAME:-admin}
      - API_PASSWORD=${API_PASSWORD:-changeme}
      - STRATEGY=${STRATEGY:-RSIStrategy}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy ${STRATEGY:-RSIStrategy}
    env_file:
      - .env
