name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit==1.7.8 pip-audit==2.7.2
      - name: Run bandit
        run: bandit -r user_data/strategies/ strategy_selector.py -c pyproject.toml

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit==2.7.2
      - name: Audit dependencies
        run: pip-audit -r requirements.txt
