name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: black check
        run: black --check user_data/strategies/ strategy_selector.py tests/
      - name: isort check
        run: isort --check-only user_data/strategies/ strategy_selector.py tests/
      - name: flake8
        run: flake8 user_data/strategies/ strategy_selector.py --max-line-length=100

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=user_data/strategies \
            --cov=strategy_selector \
            --cov-report=xml \
            --cov-fail-under=70
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: false
